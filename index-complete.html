<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>1 Month With You</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Dancing+Script:wght@500;700&family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --cream: #faf8f6;
        --rose-mid: #f0a0b8;
        --rose-deep: #d4708a;
        --rose-dark: #b85070;
        --text-dark: #4a3840;
        --text-muted: #9a8090;
      }

      body {
        font-family: "Cormorant Garamond", serif;
        background: var(--cream);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
        position: relative;
        overflow-x: hidden;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
        pointer-events: none;
        z-index: 0;
      }

      .page {
        position: relative;
        z-index: 1;
        text-align: center;
        max-width: 700px;
        width: 100%;
      }

      /* ── Header ── */
      .header {
        margin-bottom: 20px;
        animation: softRise 1.2s cubic-bezier(0.16, 1, 0.3, 1) both;
      }

      .eyebrow {
        font-family: "Cormorant Garamond", serif;
        font-style: italic;
        font-size: 1rem;
        letter-spacing: 4px;
        color: var(--rose-deep);
        text-transform: uppercase;
        margin-bottom: 12px;
        opacity: 0.8;
      }

      h1 {
        font-family: "Playfair Display", serif;
        font-size: clamp(2rem, 6vw, 3.6rem);
        font-weight: 400;
        color: var(--text-dark);
        line-height: 1.15;
        letter-spacing: 1px;
      }

      h1 em {
        font-style: italic;
        color: var(--rose-dark);
      }

      .rule {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 14px;
        margin: 18px auto 0;
      }

      .rule-line {
        width: 60px;
        height: 1px;
        background: linear-gradient(90deg, transparent, var(--rose-mid));
      }
      .rule-line:last-child {
        background: linear-gradient(90deg, var(--rose-mid), transparent);
      }
      .rule-diamond {
        width: 6px;
        height: 6px;
        background: var(--rose-deep);
        transform: rotate(45deg);
      }

      .hint {
        font-style: italic;
        color: var(--text-muted);
        font-size: 1.05rem;
        margin-top: 6px;
        animation: softRise 1.2s 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
        letter-spacing: 0.5px;
      }

      /* ── Rose Stage ── */
      .rose-stage {
        position: relative;
        width: 380px;
        height: 460px;
        margin: 30px auto 20px;
        animation: softRise 1.4s 0.2s cubic-bezier(0.16, 1, 0.3, 1) both;
      }

      @media (max-width: 500px) {
        .rose-stage {
          width: 290px;
          height: 370px;
        }
      }

      .rose-svg {
        width: 100%;
        height: 100%;
        overflow: visible;
      }

      .petal {
        cursor: pointer;
        transform-box: fill-box;
        transform-origin: center;
      }

      .petal:hover path {
        filter: brightness(0.88);
      }

      .petal.flying {
        animation: petalFly 1.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        pointer-events: none;
      }

      @keyframes petalFly {
        0% {
          opacity: 1;
          transform: translate(0, 0) rotate(0deg) scale(1);
        }
        30% {
          opacity: 1;
          transform: translate(var(--tx1), var(--ty1)) rotate(var(--tr1))
            scale(0.95);
        }
        70% {
          opacity: 0.6;
          transform: translate(var(--tx2), var(--ty2)) rotate(var(--tr2))
            scale(0.8);
        }
        100% {
          opacity: 0;
          transform: translate(var(--tx3), var(--ty3)) rotate(var(--tr3))
            scale(0.4);
        }
      }

      .petal.gone {
        display: none;
      }

      /* ── Message Card ── */
      .msg-card {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0.85);
        background: #fff;
        border: 1px solid #f0dde4;
        border-radius: 22px;
        padding: 44px 48px;
        max-width: 440px;
        width: 92vw;
        box-shadow:
          0 8px 60px rgba(180, 80, 112, 0.15),
          0 2px 12px rgba(0, 0, 0, 0.07);
        opacity: 0;
        pointer-events: none;
        z-index: 100;
        transition:
          opacity 0.35s ease,
          transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
        text-align: center;
      }

      .msg-card.visible {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
        pointer-events: all;
      }

      .msg-petal-num {
        font-family: "Cormorant Garamond", serif;
        font-style: italic;
        font-size: 0.85rem;
        letter-spacing: 3px;
        color: var(--rose-mid);
        text-transform: uppercase;
        margin-bottom: 14px;
      }

      .msg-icon {
        font-size: 1.7rem;
        display: block;
        margin-bottom: 10px;
      }

      .msg-text {
        font-family: "Dancing Script";
        font-size: 1.2rem;
        font-weight: 500;
        color: var(--rose-dark);
        line-height: 1.65;
        margin-bottom: 28px;
      }

      .msg-close {
        font-family: "Cormorant Garamond", serif;
        font-style: italic;
        font-size: 0.95rem;
        letter-spacing: 1px;
        color: var(--text-muted);
        cursor: pointer;
        border: 1px solid #f0dde4;
        background: none;
        border-radius: 30px;
        padding: 7px 20px;
        transition: all 0.2s;
      }

      .msg-close:hover {
        color: var(--rose-dark);
        border-color: var(--rose-mid);
        background: #fff5f7;
      }

      /* ── Backdrop ── */
      .backdrop {
        position: fixed;
        inset: 0;
        background: rgba(250, 248, 246, 0.72);
        backdrop-filter: blur(5px);
        z-index: 99;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.35s ease;
      }
      .backdrop.visible {
        opacity: 1;
        pointer-events: all;
      }

      /* ── Photo Reveal ── */
      .photo-overlay {
        position: fixed;
        inset: 0;
        z-index: 200;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(250, 245, 242, 0.9);
        backdrop-filter: blur(12px);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.6s ease;
      }

      .photo-overlay.visible {
        opacity: 1;
        pointer-events: all;
      }

      .photo-frame {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 18px;
        transform: scale(0.45);
        opacity: 0;
        transition:
          transform 0.75s cubic-bezier(0.34, 1.45, 0.64, 1),
          opacity 0.5s ease;
      }

      .photo-overlay.visible .photo-frame {
        transform: scale(1);
        opacity: 1;
      }

      /* Corner bracket decoration */
      .photo-wrap {
        position: relative;
        padding: 14px;
      }

      .photo-wrap::before,
      .photo-wrap::after,
      .photo-inner::before,
      .photo-inner::after {
        content: "";
        position: absolute;
        width: 26px;
        height: 26px;
        border-color: var(--rose-deep);
        border-style: solid;
      }

      .photo-wrap::before {
        top: 0;
        left: 0;
        border-width: 2px 0 0 2px;
      }
      .photo-wrap::after {
        bottom: 0;
        right: 0;
        border-width: 0 2px 2px 0;
      }

      .photo-inner {
        position: relative;
      }

      .photo-inner::before {
        top: 0;
        right: 0;
        border-width: 2px 2px 0 0;
      }
      .photo-inner::after {
        bottom: 0;
        left: 0;
        border-width: 0 0 2px 2px;
      }

      /* ── REPLACE the .photo-placeholder div with your <img> tag ── */
      .reveal-photo {
        width: min(320px, 78vw);
        height: min(390px, 58vh);
        object-fit: cover;
        border-radius: 4px;
        display: block;
        box-shadow: 0 14px 55px rgba(180, 80, 112, 0.22);
      }

      .photo-placeholder {
        width: min(320px, 78vw);
        height: min(390px, 58vh);
        border-radius: 4px;
        background: linear-gradient(145deg, #fde8f0, #f4c8d8 50%, #fde8f0);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        box-shadow: 0 14px 55px rgba(180, 80, 112, 0.22);
      }

      .placeholder-icon {
        font-size: 3rem;
      }

      .placeholder-text {
        font-family: "Dancing Script", cursive;
        font-size: 1.25rem;
        color: var(--rose-dark);
        text-align: center;
        padding: 0 28px;
        line-height: 1.6;
      }

      .photo-caption {
        font-family: "Dancing Script", cursive;
        font-size: 1.55rem;
        color: var(--rose-dark);
        text-align: center;
      }

      .photo-sub {
        font-family: "Cormorant Garamond", serif;
        font-style: italic;
        font-size: 0.88rem;
        color: var(--text-muted);
        letter-spacing: 2.5px;
        text-transform: uppercase;
        margin-top: -10px;
      }

      .photo-close {
        font-family: "Cormorant Garamond", serif;
        font-style: italic;
        font-size: 0.9rem;
        color: var(--text-muted);
        border: 1px solid #f0dde4;
        background: #fff;
        border-radius: 30px;
        padding: 8px 26px;
        cursor: pointer;
        letter-spacing: 1px;
        transition: all 0.2s;
      }

      .photo-close:hover {
        color: var(--rose-dark);
        border-color: var(--rose-mid);
      }

      /* ── Falling petals ── */
      .petal-rain {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 199;
        overflow: hidden;
      }

      .fall-petal {
        position: absolute;
        top: -50px;
        animation: fallDown linear forwards;
        opacity: 0;
      }

      @keyframes fallDown {
        0% {
          transform: translateY(0) rotate(0deg);
          opacity: 0.9;
        }
        100% {
          transform: translateY(110vh) rotate(400deg);
          opacity: 0;
        }
      }

      /* ── Footer ── */
      .footer {
        margin-top: 10px;
        color: var(--text-muted);
        font-style: italic;
        font-size: 1rem;
        letter-spacing: 1px;
        animation: softRise 1.2s 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
      }

      .footer strong {
        color: var(--rose-deep);
        font-style: normal;
        font-family: "Dancing Script", cursive;
        font-size: 1.15rem;
      }

      @keyframes softRise {
        from {
          opacity: 0;
          transform: translateY(24px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="header">
        <div class="eyebrow">1st month</div>
        <h1>Happy <em>Monthsary</em>,<br />Babyy</h1>
        <div class="rule">
          <div class="rule-line"></div>
          <div class="rule-diamond"></div>
          <div class="rule-line"></div>
        </div>
      </div>

      <p class="hint">Click mo baby yung petals, isa isa ✦</p>

      <div class="rose-stage">
        <svg
          class="rose-svg"
          viewBox="0 0 200 260"
          xmlns="http://www.w3.org/2000/svg"
        >
          <defs>
            <radialGradient id="pg1" cx="50%" cy="65%" r="60%">
              <stop offset="0%" stop-color="#fde8f0" />
              <stop offset="55%" stop-color="#f4b8cc" />
              <stop offset="100%" stop-color="#df7a9a" />
            </radialGradient>
            <radialGradient id="cg" cx="40%" cy="35%" r="65%">
              <stop offset="0%" stop-color="#ffd0e0" />
              <stop offset="50%" stop-color="#e8809a" />
              <stop offset="100%" stop-color="#c05878" />
            </radialGradient>
            <linearGradient id="stemGrad" x1="0%" y1="0%" x2="10%" y2="100%">
              <stop offset="0%" stop-color="#6aaa6a" />
              <stop offset="100%" stop-color="#3d6e3d" />
            </linearGradient>
            <filter id="ps" x="-20%" y="-20%" width="140%" height="140%">
              <feDropShadow
                dx="0"
                dy="3"
                stdDeviation="3"
                flood-color="#c06078"
                flood-opacity="0.28"
              />
            </filter>
            <filter id="cs">
              <feDropShadow
                dx="0"
                dy="2"
                stdDeviation="2.5"
                flood-color="#803040"
                flood-opacity="0.3"
              />
            </filter>
          </defs>

          <!-- STEM — starts at rose base (y=96) goes to bottom of viewBox -->
          <path
            d="M100 96 Q102 130 100 165 Q98 200 100 255"
            stroke="url(#stemGrad)"
            stroke-width="3.5"
            fill="none"
            stroke-linecap="round"
          />

          <!-- Left leaf -->
          <path
            d="M100 158 Q79 147 71 161 Q84 167 100 161"
            fill="url(#stemGrad)"
            opacity="0.88"
          />
          <!-- Right leaf -->
          <path
            d="M100 190 Q121 178 129 192 Q116 198 100 193"
            fill="url(#stemGrad)"
            opacity="0.88"
          />

          <!-- 
        PETALS — base petal points upward from (100,90).
        All 5 rotated around center (100,90).
      -->

          <!-- Petal 1 — TOP -->
          <g
            class="petal"
            id="p1"
            style="
              --tx1: -8px;
              --ty1: -38px;
              --tr1: -22deg;
              --tx2: -28px;
              --ty2: -105px;
              --tr2: -52deg;
              --tx3: -48px;
              --ty3: -175px;
              --tr3: -90deg;
            "
          >
            <path
              d="M100 90 C91 68 83 50 100 34 C117 50 109 68 100 90Z"
              fill="url(#pg1)"
              stroke="#e090aa"
              stroke-width="0.8"
              filter="url(#ps)"
            />
          </g>

          <!-- Petal 2 — TOP-RIGHT (72°) -->
          <g
            class="petal"
            id="p2"
            style="
              --tx1: 30px;
              --ty1: -20px;
              --tr1: 34deg;
              --tx2: 78px;
              --ty2: -48px;
              --tr2: 75deg;
              --tx3: 138px;
              --ty3: -78px;
              --tr3: 125deg;
            "
          >
            <path
              d="M100 90 C91 68 83 50 100 34 C117 50 109 68 100 90Z"
              fill="url(#pg1)"
              stroke="#e090aa"
              stroke-width="0.8"
              filter="url(#ps)"
              transform="rotate(72 100 90)"
            />
          </g>

          <!-- Petal 3 — BOTTOM-RIGHT (144°) -->
          <g
            class="petal"
            id="p3"
            style="
              --tx1: 34px;
              --ty1: 24px;
              --tr1: 20deg;
              --tx2: 88px;
              --ty2: 68px;
              --tr2: 52deg;
              --tx3: 148px;
              --ty3: 110px;
              --tr3: 98deg;
            "
          >
            <path
              d="M100 90 C91 68 83 50 100 34 C117 50 109 68 100 90Z"
              fill="url(#pg1)"
              stroke="#e090aa"
              stroke-width="0.8"
              filter="url(#ps)"
              transform="rotate(144 100 90)"
            />
          </g>

          <!-- Petal 4 — BOTTOM-LEFT (216°) -->
          <g
            class="petal"
            id="p4"
            style="
              --tx1: -34px;
              --ty1: 24px;
              --tr1: -20deg;
              --tx2: -88px;
              --ty2: 68px;
              --tr2: -52deg;
              --tx3: -148px;
              --ty3: 110px;
              --tr3: -98deg;
            "
          >
            <path
              d="M100 90 C91 68 83 50 100 34 C117 50 109 68 100 90Z"
              fill="url(#pg1)"
              stroke="#e090aa"
              stroke-width="0.8"
              filter="url(#ps)"
              transform="rotate(216 100 90)"
            />
          </g>

          <!-- Petal 5 — TOP-LEFT (288°) -->
          <g
            class="petal"
            id="p5"
            style="
              --tx1: -30px;
              --ty1: -20px;
              --tr1: -34deg;
              --tx2: -78px;
              --ty2: -48px;
              --tr2: -75deg;
              --tx3: -138px;
              --ty3: -78px;
              --tr3: -125deg;
            "
          >
            <path
              d="M100 90 C91 68 83 50 100 34 C117 50 109 68 100 90Z"
              fill="url(#pg1)"
              stroke="#e090aa"
              stroke-width="0.8"
              filter="url(#ps)"
              transform="rotate(288 100 90)"
            />
          </g>

          <!-- ROSE CENTER -->
          <circle cx="100" cy="90" r="17" fill="url(#cg)" filter="url(#cs)" />
          <circle cx="100" cy="90" r="11" fill="#d06080" opacity="0.45" />
          <circle cx="100" cy="90" r="6" fill="#b84868" opacity="0.55" />
          <ellipse
            cx="95"
            cy="85"
            rx="4.5"
            ry="3"
            fill="#ffeef4"
            opacity="0.5"
            transform="rotate(-20 95 85)"
          />
        </svg>
      </div>

      <div class="footer">
        <strong>From the Bottom of my Heart</strong> &mdash; I Love You Soo Much! ✦
      </div>
    </div>

    <!-- Falling petals layer -->
    <div class="petal-rain" id="petalRain"></div>

    <!-- Backdrop -->
    <div class="backdrop" id="backdrop"></div>

    <!-- Message Card -->
    <div class="msg-card" id="msgCard">
      <div class="msg-petal-num" id="msgLabel">petal i</div>
      <div class="msg-text" id="msgText"></div>
      <button class="msg-close" id="msgClose">close ✕</button>
    </div>

    <!-- Photo Reveal Overlay -->
    <div class="photo-overlay" id="photoOverlay">
      <div class="photo-frame">
        <div class="photo-caption">Us ♡</div>

        <div class="photo-wrap">
          <div class="photo-inner">
  
                                                       
            <img src="pic.jpg"                  
            class="reveal-photo" alt="Us" />      

          </div>
        </div>

        <div class="photo-caption" style="font-size: 1.2rem">
          Happy 1st Monthsary, Babyy 🌹
        </div>
        <button class="photo-close" id="photoClose">close ✕</button>
      </div>
    </div>

    <script>
      // ── Customize your 5 messages below ──
      const messages = [
        "I LOVEEE YOUUU SOO MUCHHH!! I love how you treat me, para mo na akong asawa itrato. I hope you stay consistent my baby, hindi sa umpisa lang!",
        "I HATE YOUUUUU!! I hate how you hate yourself. Pag nagsasabi ka po ng bad things like, di ka maganda and mga insecurities mo din po abt yourself, naiinis po ako kasi hindi mo po ba talaga mapagtanto kung ganong kahanga hanga yang pagkatao mo?? kung oo, i-eelaborate ko sayo",
        "I LOVEE YOUUU MY BABYY!! I love how you think positively. Pag po may instances na nakakabaliw, andyan ka po para i guide akoo, pinapangunahan mo ng mga salita na nakakapag pagaan ng loob kaya po kinakaya ko or natin yung mga problema na dumadating dahil po sa way of thinking mo. Thank you babyy, stay positive minded!!",
        "SORRY BABY PERO I HATEE YOUUUU POO!! I hate how you think it's always your fault. Everytime po na may misunderstading tayo, pag nag eexplain po ako lagi kapo nag sosorry and inaako yung kasalanan, masakit po sakin tuwing ganon kasi po ang gusto ko lang naman is maliwanagan ka sa kung anong nangyayari and hindi kapo saktan. ANG BABYY KO E",
        "HI BABYYY I LOVE YOUU SOO MCUHH!! I love how you display your love publicly po. Kung gano ka ka clingy in private, ganon parin po sa public like para bang hindi mo ako kinakahiya. Thank youu so much po baby bino boost mo po confidence ko and I really really love it po, how you kiss my cheek, forehead, and lalo na lips sa harap ng maraming tao. DABEST!!!! IT FEELS LIKE YOU'RE TELLING THE WORLD NA AKO BOYFRIEND MO BEM!!!",
      ];

      const labels = [
        "She Loves me 🌸",
        "She Loves me not 🥺",
        "She Loves me 🌹",
        "She Loves me not 😔",
        "She Loves me 💕",
      ];

      const card = document.getElementById("msgCard");
      const backdrop = document.getElementById("backdrop");
      const msgText = document.getElementById("msgText");
      const msgLabel = document.getElementById("msgLabel");
      const msgClose = document.getElementById("msgClose");
      const photoOverlay = document.getElementById("photoOverlay");
      const photoClose = document.getElementById("photoClose");
      const petalRain = document.getElementById("petalRain");

      let petalsRemoved = 0;

      function showMessage(index) {
        msgLabel.textContent = labels[index];
        msgText.textContent = messages[index];
        card.classList.add("visible");
        backdrop.classList.add("visible");
      }

      function hideMessage() {
        card.classList.remove("visible");
        backdrop.classList.remove("visible");
        if (petalsRemoved >= 5) {
          setTimeout(triggerPhotoReveal, 420);
        }
      }

      function triggerPhotoReveal() {
        spawnPetalRain();
        photoOverlay.classList.add("visible");
      }

      function spawnPetalRain() {
        const emojis = ["🌸", "🌺", "💕", "✨", "🌹", "💖"];
        for (let i = 0; i < 26; i++) {
          const el = document.createElement("span");
          el.className = "fall-petal";
          el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
          el.style.left = Math.random() * 100 + "vw";
          el.style.fontSize = 0.9 + Math.random() * 1.3 + "rem";
          const dur = 2.8 + Math.random() * 2.5;
          el.style.animationDuration = dur + "s";
          el.style.animationDelay = Math.random() * 1.8 + "s";
          petalRain.appendChild(el);
          setTimeout(() => el.remove(), (dur + 2.5) * 1000);
        }
      }

      msgClose.addEventListener("click", hideMessage);
      backdrop.addEventListener("click", hideMessage);
      photoClose.addEventListener("click", () =>
        photoOverlay.classList.remove("visible"),
      );

      // Wire petals
      for (let i = 1; i <= 5; i++) {
        const el = document.getElementById("p" + i);
        const idx = i - 1;
        let clicked = false;

        el.addEventListener("click", () => {
          if (clicked) return;
          clicked = true;
          el.classList.add("flying");
          el.addEventListener(
            "animationend",
            () => {
              el.classList.add("gone");
              petalsRemoved++;
              showMessage(idx);
            },
            { once: true },
          );
        });
      }
    </script>
  </body>
</html>
